name: Notify ongoing incidents
on:
  workflow_run:
    workflows: ["Uptime CI"]  # Uptime CI가 끝난 후 실행
    types:
      - completed
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check for open issues and notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.NOTIFICATION_SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUES=$(gh issue list --repo ${{ github.repository }} --state open --json title,url,createdAt \
            --jq '.[] | "🟥 Ongoing: \(.title)\nIssue: \(.url)\nSince: \(.createdAt)"')
          if [ -n "$ISSUES" ]; then
            curl -X POST $SLACK_WEBHOOK \
            -H 'Content-type: application/json' \
            -d "{\"text\": \"$ISSUES\"}"
          fi
